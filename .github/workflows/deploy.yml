name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            if [ ! -d "trash-tech" ]; then
              git clone https://github.com/mhmdrizky26/trash-tech.git
            fi

            cd trash-tech
            git pull

            sudo docker stop trash-tech || true
            sudo docker rm trash-tech || true

            sudo docker build -t trash-tech .
            sudo docker run -d -p 80:3000 trash-tech